<div class="address-form">
  <div class="form-header">
    <h3>{{ isEditMode ? '✏️ Edit Address' : '📍 Add New Address' }}</h3>
  </div>

  <form (ngSubmit)="onSubmit()" #addressForm="ngForm">
    <div class="form-group">
      <label>Address Type</label>
      <div class="radio-group">
        <label class="radio-option">
          <input type="radio" name="address_type" [(ngModel)]="formData.address_type" value="home" required>
          <span>🏠 Home</span>
        </label>
        <label class="radio-option">
          <input type="radio" name="address_type" [(ngModel)]="formData.address_type" value="work" required>
          <span>💼 Work</span>
        </label>
        <label class="radio-option">
          <input type="radio" name="address_type" [(ngModel)]="formData.address_type" value="other" required>
          <span>📍 Other</span>
        </label>
      </div>
    </div>

    <div class="form-group">
      <label>Street Address *</label>
      <input type="text"
             name="street"
             class="form-control"
             [(ngModel)]="formData.street"
             required
             minlength="3"
             placeholder="Enter street name"
             #street="ngModel">
      @if (street.invalid && street.touched) {
        <div class="error-text">Street must be at least 3 characters</div>
      }
    </div>

    <div class="form-row">
      <div class="form-group">
        <label>Building/House</label>
        <input type="text" name="building" class="form-control" [(ngModel)]="formData.building" placeholder="Building number">
      </div>
      <div class="form-group">
        <label>Apartment</label>
        <input type="text" name="apartment" class="form-control" [(ngModel)]="formData.apartment" placeholder="Apt, suite, unit">
      </div>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label>Entrance</label>
        <input type="text" name="entrance" class="form-control" [(ngModel)]="formData.entrance" placeholder="Entrance no.">
      </div>
      <div class="form-group">
        <label>Floor</label>
        <input type="text" name="floor" class="form-control" [(ngModel)]="formData.floor" placeholder="Floor no.">
      </div>
    </div>

    <div class="form-group">
      <label>Phone Number *</label>
      <input type="tel"
             name="phone_number"
             class="form-control"
             placeholder="+7 777 123 4567"
             [(ngModel)]="formData.phone_number"
             required
             #phone="ngModel">
      @if (phone.invalid && phone.touched) {
        <div class="error-text">Phone number is required</div>
      }
      <div class="hint-text">Example: +7 777 123 4567</div>
    </div>

    <div class="form-group">
      <label>Special Instructions</label>
      <textarea name="special_instructions"
                class="form-control"
                rows="2"
                [(ngModel)]="formData.special_instructions"
                placeholder="Door code, landmark, delivery notes..."></textarea>
    </div>

    <div class="checkbox-group">
      <label class="checkbox-option">
        <input type="checkbox" name="is_default" [(ngModel)]="formData.is_default">
        <span>Set as default address</span>
      </label>
    </div>

    <div class="form-actions">
      <button type="button" class="btn-cancel" (click)="onCancel()" [disabled]="isLoading">Cancel</button>
      <button type="submit" class="btn-save" [disabled]="!addressForm.valid || isLoading">
        {{ isLoading ? 'Saving...' : (isEditMode ? 'Update Address' : 'Save Address') }}
      </button>
    </div>
  </form>
</div>
